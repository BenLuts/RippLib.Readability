name: Release to NuGet

on:
  workflow_dispatch
    
jobs:
  # Windows runner required: RippLib.Readability.Tests targets net472/net480/net481
  # which need the .NET Framework runtime, only available on windows-latest.
  # QueryableExtensions.Tests is excluded here because it uses Testcontainers with a
  # Linux SQL Server image, which cannot run on Windows.
  test-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Build
      run: dotnet build -c Release
    - name: Test
      run: dotnet test -c Release --no-build --filter "FullyQualifiedName!~Queryable" -m:1

  # Linux runner required: QueryableExtensions.Tests uses Testcontainers to spin up a
  # SQL Server Docker image, which requires a Linux Docker host.
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Build
      run: dotnet build -c Release
    - name: Test QueryableExtensions
      run: dotnet test QueryableExtensions.Tests/QueryableExtensions.Tests.csproj -c Release --verbosity normal

  # Pack and push only once, on Windows, and only after BOTH test jobs succeed.
  publish:
    runs-on: windows-latest
    needs: [test-windows, test-linux]
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Build
      run: dotnet build -c Release
    - name: Pack nugets
      run: dotnet pack -c Release --no-build --output .
    - name: Push to NuGet
      run: dotnet nuget push "*.nupkg" --api-key ${{secrets.NUGET_API}} --source https://api.nuget.org/v3/index.json
